
# ─── INPUTS ───────────────────────────────────────────────────────────────────
inputs:
  domains_file: "inputs/domains.txt"           # one domain per line
  repos_file: "inputs/repos.txt"               # GitHub/GitLab repo URLs
  gateway_exports_dir: "inputs/gateway_exports"
  openapi_specs_dir: "inputs/openapi_specs"
  logs_dir: "inputs/logs"
  pcap_dir: "inputs/pcap"
  baseline_file: "inputs/baseline.json"        # approved API registry

# ─── SCAN SETTINGS ────────────────────────────────────────────────────────────
scan:
  mode: "passive"            # passive | active (active enables full OWASP testing)
  concurrency: 20
  timeout: 12
  max_pages: 300
  wordlist: "wordlists/combined.txt"
  js_crawl: true
  subdomain_discovery: true
  user_agent: "Mozilla/5.0 (compatible; APIDiscovery/1.0)"

#brute exclusion---------------------------------
brute_force:
  enabled: true
  concurrency: 10
  max_paths: 50000
  # Add this section:
  exclude_extensions:
    - ".htm"
    - ".html"
    - ".htaccess"
    - ".htpasswd"
    - ".htc"
    - ".hts"
    - ".hta"
  exclude_prefixes:
    - "/.ht"
    - "/.htm"
    - "/.html"
    
# ─── PIPELINE ENABLE/DISABLE ──────────────────────────────────────────────────
pipeline:
  external_scan: true
  source_scan: true
  log_analysis: true
  traffic_analysis: true
  gateway_query: true
  classifier: true
  owasp: true
  enrichment: true
  reporter: true

# ─── LIVE AGENT ───────────────────────────────────────────────────────────────
agent:
  enabled: false
  interface: "eth0"
  tls_mode: "mirror"         # mirror | keylog | http_only
  keylog_file: ""            # path to NSS key log file (tls_mode=keylog)
  mirror_host: ""            # host:port of decrypted mirror (tls_mode=mirror)
  output_interval_seconds: 30

# ─── GATEWAY CREDENTIALS ──────────────────────────────────────────────────────
gateways:
  kong:
    enabled: false
    admin_url: "http://kong:8001"
    token: ""
  aws_apigw:
    enabled: false
    region: "ap-south-1"
    access_key: ""
    secret_key: ""
  apigee:
    enabled: false
    org: ""
    token: ""
  azure_apim:
    enabled: false
    subscription_id: ""
    resource_group: ""
    service_name: ""
    token: ""

# ─── GITHUB / SOURCE SCAN ─────────────────────────────────────────────────────
source_scan:
  github_token: ""           # personal access token for private repos
  run_semgrep: true
  run_secret_scan: true
  clone_depth: 1

# ─── OWASP SETTINGS ───────────────────────────────────────────────────────────
owasp:
  # passive mode: inspect responses for indicators
  # active mode: send test payloads (only use on non-production)
  test_bola: true
  test_broken_auth: true
  test_mass_assignment: true
  test_rate_limit: true
  test_bfla: true
  test_ssrf: true
  test_misconfiguration: true
  test_inventory: true
  active_delay_ms: 500       # delay between active test requests

# ─── CLASSIFICATION RULES ─────────────────────────────────────────────────────
classification:
  # What counts as "authorized" — all available sources are used
  use_gateway_export: true
  use_openapi_specs: true
  use_baseline_json: true
  # New API = appeared after this date (ISO format), empty = use first scan as baseline
  new_api_since: ""
  # Rogue indicators
  rogue_patterns:
    - "/debug"
    - "/internal"
    - "/admin"
    - "/.env"
    - "/actuator"
    - "/phpinfo"

# ─── OUTPUT ───────────────────────────────────────────────────────────────────
output:
  directory: "output"
  json: true
  pdf: true
  word: true
  client_name: "testing-CRVM"
  engagement_name: "API Discovery & Security Evaluation"
